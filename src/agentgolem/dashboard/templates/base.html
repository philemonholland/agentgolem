<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AgentGolem{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --ag-border: rgba(148, 163, 184, 0.25);
            --ag-bg: rgba(15, 23, 42, 0.04);
            --ag-muted: #64748b;
            --ag-recent: rgba(59, 130, 246, 0.12);
            --ag-success: #0f766e;
            --ag-warning: #b45309;
            --ag-danger: #b91c1c;
        }

        body { background: #0f172a; color: #e2e8f0; }
        main.container, nav.container, footer.container { max-width: 1500px; }
        nav, article, section, table, details, pre, textarea, input, select {
            background: rgba(15, 23, 42, 0.55);
            border-color: var(--ag-border);
        }
        nav { margin: 1rem auto; border-radius: 14px; padding: 0.75rem 1rem; }
        nav a { color: #cbd5e1; }
        nav strong { color: #f8fafc; }
        h1, h2, h3, h4, strong { color: #f8fafc; }
        small, .muted { color: var(--ag-muted); }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
        .panel { padding: 1rem; border-radius: 14px; background: rgba(15, 23, 42, 0.45); }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
        }
        .card-grid--council {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        @media (max-width: 960px) {
            .card-grid--council {
                grid-template-columns: 1fr;
            }
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .summary-card, .agent-card, .setting-card, .transcript-entry {
            border: 1px solid var(--ag-border);
            border-radius: 14px;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.48);
        }
        .summary-card strong { display: block; font-size: 1.5rem; margin-top: 0.35rem; }
        .selected-card {
            border-color: rgba(59, 130, 246, 0.55);
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.25);
        }
        .recent-card {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.12), rgba(15, 23, 42, 0.48));
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            font-size: 0.75rem;
            border: 1px solid transparent;
            margin-right: 0.35rem;
            margin-bottom: 0.35rem;
        }
        .badge-awake { background: rgba(34, 197, 94, 0.16); color: #86efac; border-color: rgba(34, 197, 94, 0.25); }
        .badge-asleep { background: rgba(56, 189, 248, 0.16); color: #7dd3fc; border-color: rgba(56, 189, 248, 0.25); }
        .badge-paused { background: rgba(245, 158, 11, 0.16); color: #fcd34d; border-color: rgba(245, 158, 11, 0.25); }
        .badge-danger { background: rgba(239, 68, 68, 0.16); color: #fca5a5; border-color: rgba(239, 68, 68, 0.25); }
        .badge-info { background: rgba(59, 130, 246, 0.16); color: #93c5fd; border-color: rgba(59, 130, 246, 0.25); }
        .badge-success { background: rgba(16, 185, 129, 0.16); color: #99f6e4; border-color: rgba(16, 185, 129, 0.25); }
        .badge-warning { background: rgba(245, 158, 11, 0.16); color: #fde68a; border-color: rgba(245, 158, 11, 0.25); }
        .badge-muted { background: rgba(148, 163, 184, 0.12); color: #cbd5e1; border-color: rgba(148, 163, 184, 0.22); }
        .recent-pill { background: var(--ag-recent); color: #bfdbfe; border-color: rgba(59, 130, 246, 0.3); }
        .button-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .button-row form { margin: 0; }
        .stack { display: grid; gap: 0.75rem; }
        .tight-list { margin: 0.5rem 0 0; padding-left: 1.25rem; }
        .compact-table td, .compact-table th { padding: 0.45rem 0.6rem; }
        .setting-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .setting-card form { margin-top: 0.75rem; }
        .flash-success, .flash-danger {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
        }
        .flash-success { background: rgba(16, 185, 129, 0.16); border: 1px solid rgba(16, 185, 129, 0.28); }
        .flash-danger { background: rgba(239, 68, 68, 0.16); border: 1px solid rgba(239, 68, 68, 0.28); }
        .textarea-small { min-height: 7rem; }
        .inline-filter { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: end; }
        pre {
            white-space: pre-wrap;
            word-break: break-word;
            border-radius: 12px;
            padding: 1rem;
        }
        footer { margin: 2rem auto; text-align: center; color: var(--ag-muted); }

        /* Cognition signal bars & layout */
        .cog-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.35rem 0; font-size: 0.85rem; }
        .cog-label { min-width: 5.5rem; color: var(--ag-muted); flex-shrink: 0; }
        .cog-bar-track {
            flex: 1;
            max-width: 120px;
            height: 6px;
            border-radius: 3px;
            background: rgba(148, 163, 184, 0.15);
            overflow: hidden;
        }
        .cog-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .cog-bar-fill--blue { background: #60a5fa; }
        .cog-bar-fill--green { background: #34d399; }
        .cog-bar-fill--amber { background: #fbbf24; }
        .cog-bar-fill--red { background: #f87171; }
        .cog-bar-fill--purple { background: #a78bfa; }
        .cog-val { font-size: 0.75rem; color: #94a3b8; min-width: 2rem; text-align: right; }
        .cog-text { color: #e2e8f0; font-size: 0.85rem; }
        .cog-section { margin-top: 0.5rem; padding-top: 0.4rem; border-top: 1px solid rgba(148, 163, 184, 0.1); }
        .cog-section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ag-muted); margin-bottom: 0.25rem; }
        .cog-warming { font-style: italic; color: #64748b; font-size: 0.82rem; }
        .desire-list { list-style: none; padding: 0; margin: 0.25rem 0 0 0; }
        .desire-list li { font-size: 0.82rem; padding: 0.15rem 0; }
        .desire-list li::before { content: "✦ "; color: #a78bfa; }
    </style>
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong>AgentGolem</strong></li>
            <li><small>Consciousness console</small></li>
        </ul>
        <ul>
            <li><a href="/dashboard">Consciousness</a></li>
            <li><a href="/dashboard/settings">Settings</a></li>
            <li><a href="/dashboard/soul">Soul</a></li>
            <li><a href="/dashboard/heartbeat">Heartbeat</a></li>
            <li><a href="/dashboard/memory">Memory</a></li>
            <li><a href="/dashboard/logs">Logs</a></li>
            <li><a href="/dashboard/approvals">Approvals</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>Live refresh: every {{ refresh_interval | default(5) }}s</small>
    </footer>
</body>
</html>
